services:
  postgres:
    image: postgres:14.1-alpine
    restart: unless-stopped
    hostname: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    expose:
      - 5432
    ports:
      - '55432:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - default

  minio:
    image: minio/minio:latest-cicd
    restart: unless-stopped
    hostname: minio
    expose:
      - 9009
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: minio server --address :9009 /bitnami/minio/data
    volumes:
      - ./minio-data:/bitnami/minio/data
    networks:
      - default

  webapp:
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    build: '.'
    restart: unless-stopped
    links:
      - postgres:postgres
      - minio:minio
    ports:
      - '56481:8080'
      - '5705:5705'
    expose:
      - 8080
      - 8081
    labels:
      promtail: "true"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/
      - MINIO_URL=http://minio:9009
      - ALLOWED_ORIGIN=http://172.22.0.20:56481
      - MINIO_DEFAULT_BUCKET=main
      - INSTANCE_NAME=${INSTANCE_NAME}
      - LLM_URL=${LLM_URL}
      - PLUGINS_DIR=/home/java/plugins
      - LOG_PATH=/home/java/logs
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=uldesk_global_search
    volumes:
      - ./webapp-logs:/home/java/logs
      - ./plugins:/home/java/plugins
      - ./logs:/home/java/logs
    networks:
      - default
      - monitoring

  grafana:
    build: './config/grafana'
    restart: unless-stopped
    ports:
      - '3000:3000'
    expose:
      - 3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - loki
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    expose:
      - 9090
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--log.level=debug'
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - ./config/promtail/config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./webapp-logs:/webapp-logs:ro
    command: -config.file=/etc/promtail/config.yaml
    expose:
      - 9080
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command:
      - '-config.file=/etc/loki/config.yaml'
    volumes:
      - ./config/loki/config.yaml:/etc/loki/config.yaml:ro
      - ./loki-index:/data/index
      - ./loki-chunks:/data/chunks
      - ./loki-cache:/data/cache
      - ./loki-compactor:/data/compactor
      - ./loki-wal:/loki/wal
    expose:
      - 3100
      - 9095
    depends_on:
      - promtail
    user: root
    networks:
      - monitoring

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: uldesk-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - 9200
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
  monitoring:
    driver: bridge
    name: itdesk_monitoring
    external: false
